<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arco Entertainment | Agenciamento & Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo">
                <a href="/">
                    <img src="src/assets/icons/logo_principal.png" alt="Arco Logo"> 
                </a>
            </div>

            <button class="mobile-menu-btn" aria-label="Abrir Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-links">
                <li><a href="#ent">ENT</a></li>
                <li><a href="#corp">CORP</a></li>
                <li><a href="#dart">DART</a></li>
                <li><a href="#contato">CONTATO</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <h1>ARCO</h1>
                <p>CRIANDO MOMENTOS, AGENCIANDO TALENTOS.</p>
            </div>
        </section>

        <!-- Rolo de Fotos (Carrossel) -->
        <section class="photo-roller">
            <div class="roller-container">
                <img src="src/assets/images/foto_carrossel_01.jpg" alt="Evento 1">
                <img src="src/assets/images/foto_carrossel_02.jpg" alt="Evento 2">
                <img src="src/assets/images/foto_carrossel_03.jpg" alt="Evento 3">
                <img src="src/assets/images/foto_carrossel_04.jpg" alt="Evento 4">
                <img src="src/assets/images/foto_carrossel_05.jpg" alt="Evento 5">
            </div>
        </section>

        <!-- Seções das Abas com Cores Temáticas -->
        <section id="ent" class="content-section section-ent">
            <h2>ENT</h2>
        </section>

        <section id="corp" class="content-section section-corp">
            <h2>CORP</h2>
        </section>

        <section id="dart" class="content-section section-dart">
            <h2>DART</h2>
        </section>

        <section id="contato" class="content-section">
            <h2>CONTATO</h2>
        </section>
    </main>

    <script>
        const btn = document.querySelector('.mobile-menu-btn');
        const nav = document.querySelector('.nav-links');

        btn.addEventListener('click', () => {
            nav.classList.toggle('active');
            btn.classList.toggle('active');
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('active');
                btn.classList.remove('active');
            });
        });
    </script>
</body>
</html>
