<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arco Entertainment | Agenciamento & Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo">
                <a href="/">
                    <img src="src/assets/icons/Logo Central (Preto-Branco)" alt="Arco Logo"> 
                </a>
            </div>

            <button class="mobile-menu-btn" aria-label="Abrir Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-links">
                <li><a href="#ent">ENT</a></li>
                <li><a href="#corp">CORP</a></li>
                <li><a href="#dart">DART</a></li>
                <li><a href="#contato">CONTATO</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>ARCO</h1>
                <p>CRIANDO MOMENTOS, AGENCIANDO TALENTOS.</p>
            </div>
        </section>
    </main>

    <script>
        const btn = document.querySelector('.mobile-menu-btn');
        const nav = document.querySelector('.nav-links');

        btn.addEventListener('click', () => {
            nav.classList.toggle('active');
            btn.classList.toggle('active');
        });
    </script>
</body>
</html>
